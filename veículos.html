<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="style.css">
    <title>Veículos</title>
</head>
<body>
    <nav>
        <div class="menu-icon" onclick="toggleMenu()">
  ☰
</div>
        <ul class="nav-links" id="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="veículos.html">Comprar</a></li>
            <li><a href="index.html#contato">Contato</a></li>
        </ul>
        <img src="src/imgens/Autotech.png" alt="logo da empresa" class="logo">
    </nav>
    <h1>Veículos Disponíveis</h1>
    <section class="veiculos-section">
        <div class="veiculos-grid">
            <div class="veiculo-card">
                <img src="src/imgens/cityone.png" alt="Cityone" class="car">
                <h3>Cityone</h3>
                <p class="preco">Preço: R$ 150.000,00</p>
                <button>Comprar</button>
            </div>
            <div class="veiculo-card">
                <img src="src/imgens/Drivex.png" alt="Drivex" class="car">
                <h3>Drivex</h3>
                <p class="preco">Preço: R$ 200.000,00</p>
                <button>Comprar</button>
            </div>
            <div class="veiculo-card">
                <img src="src/imgens/terrax.png" alt="Terrax" class="car">
                <h3>Terrax</h3>
                <p class="preco">Preço: R$ 250.000,00</p>
                <button>Comprar</button>
            </div>
            <div class="veiculo-card">
                <img src="src/imgens/voltis.png" alt="Voltis" class="car">
                <h3>Voltis</h3>
                <p class="preco">Preço: R$ 300.000,00</p>
                <button>Comprar</button>
            </div>
        </div>
    </section>
    <script src="script/engine.js"></script>
